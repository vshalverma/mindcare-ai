model:
  name: distilbert-base-uncased
  max_length: 96
  cache_dir: models/encoder
training:
  output_dir: models/checkpoints
  num_train_epochs: 1
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  learning_rate: 5.0e-05
  weight_decay: 0.01
  warmup_ratio: 0.06
  fp16: true
  eval_every_steps: 999999
  save_every_epochs: 1
  seed: 42
  max_train_samples: 20000
  max_eval_samples: 4000
  gradient_accumulation_steps: 1
  dataloader_num_workers: 0
data:
  processed_dir: data/processed
  train_file: unified_train.parquet
  val_file: unified_val.parquet
  test_file: unified_test.parquet
emotions:
- admiration
- amusement
- anger
- annoyance
- approval
- caring
- confusion
- curiosity
- desire
- disappointment
- disapproval
- disgust
- embarrassment
- excitement
- fear
- gratitude
- grief
- joy
- love
- nervousness
- optimism
- pride
- realization
- relief
- remorse
- sadness
- surprise
- neutral
